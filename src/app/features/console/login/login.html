<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow-lg border-0" style="width: 100%; max-width: 400px;">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <h2 class="fw-bold text-dark">Console Login</h2>
        <p class="text-muted">Access your administration panel</p>
      </div>

      @if (errorMessage()) {
        <div class="alert alert-danger border-0 small mb-4" role="alert">
          <i class="bi bi-exclamation-circle me-2"></i> {{ errorMessage() }}
        </div>
      }

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label small fw-bold text-uppercase">Email Address</label>
          <input type="email" class="form-control py-2" formControlName="email" placeholder="admin@demohandler.in">
        </div>
        <div class="mb-4">
          <label class="form-label small fw-bold text-uppercase">Password</label>
          <input type="password" class="form-control py-2" formControlName="password" placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-dark w-100 py-2 fw-bold shadow-sm" [disabled]="loginForm.invalid || loading()">
          @if (loading()) {
            <span class="spinner-border spinner-border-sm me-2" role="status"></span> Logging in...
          } @else {
            Sign In <i class="bi bi-arrow-right ms-2"></i>
          }
        </button>
      </form>
    </div>
  </div>
</div>
